<svg width="600" height="500" viewBox="-300 -250 600 500" xmlns="http://www.w3.org/2000/svg">

  <rect x="-300" y="-250" width="600" height="500" fill="#0d1117"/>

  <!-- Ejes -->
  <line x1="-250" y1="0" x2="250" y2="0" stroke="gray" stroke-width="1"/>
  <line x1="0" y1="-200" x2="0" y2="200" stroke="gray" stroke-width="1"/>

  <!-- Punto a -->
  <circle cx="70" cy="0" r="6" fill="red"/>
  <text x="80" y="20" fill="red" font-size="20">a</text>

  <!-- Contorno C -->
  <circle cx="0" cy="0" r="120" fill="none" stroke="#1f6feb" stroke-width="3"/>
  <text x="-10" y="-140" fill="#1f6feb" font-size="20">C</text>

  <!-- Punto moviéndose -->
  <circle r="8" fill="gold">
    <animateMotion dur="6s" repeatCount="indefinite"
      path="M 120 0 A 120 120 0 1 1 -120 0 A 120 120 0 1 1 120 0"/>
  </circle>

  <!-- Fórmula -->
  <text x="-260" y="220" fill="white" font-size="22" font-family="serif">
    f(a) = 1 / (2πi) ∮₍C₎ f(z)/(z - a) dz
  </text>

</svg>
